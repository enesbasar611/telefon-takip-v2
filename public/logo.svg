<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Smartphone Frame -->
  <rect x="128" y="64" width="256" height="384" rx="40" stroke="url(#logo-gradient)" stroke-width="24" filter="url(#glow)" />
  
  <!-- Inner Screen Area -->
  <rect x="156" y="92" width="200" height="328" rx="24" fill="url(#logo-gradient)" fill-opacity="0.1" />
  
  <!-- Branding Elements inside screen -->
  <path d="M220 200L292 256L220 312" stroke="url(#logo-gradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="256" cy="410" r="14" fill="url(#logo-gradient)" />
  
  <!-- Tech Accents -->
  <path d="M180 140H332" stroke="url(#logo-gradient)" stroke-width="12" stroke-linecap="round" opacity="0.4" />
</svg>
