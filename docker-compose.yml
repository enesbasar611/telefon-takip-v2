services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      image: ghcr.io/enesbasar611/telefon-takip-v2:latest
    container_name: telefon-takip
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@db:5432/telefontakip?schema=public
      - NEXTAUTH_URL=http://your-vps-ip:5000
      - NEXTAUTH_SECRET=your-secret-here
      - GOOGLE_API_KEY=your-api-key
    volumes:
      - whatsapp-auth:/app/.whatsapp-auth
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: telefon-takip-db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=telefontakip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Changed to avoid conflict if host has postgres

volumes:
  postgres-data:
  whatsapp-auth:
