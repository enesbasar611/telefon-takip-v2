name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: enesbasar611
          password: ${{ secrets.DOCKER_PASSWORD }} # Burası GitHub'daki Secret'tan alacak

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Buraya dikkat: kullanıcı adın enesbasar611 olarak güncellendi
          tags: ghcr.io/enesbasar611/telefon-takip-v2:latest