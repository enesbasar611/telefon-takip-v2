name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚡ ÖNEMLİ: Akıllı build ve cache yönetimi için bu adım şart kanka
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: enesbasar611
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/enesbasar611/telefon-takip-v2:latest
          # ⚡ İŞTE SİHİRLİ DOKUNUŞLAR BURASI ⚡
          cache-from: type=gha
          cache-to: type=gha,mode=max